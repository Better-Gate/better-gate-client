name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  APP_NAME: Better Gate
  ASSET_PREFIX: Better-Gate

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            label: Windows
          - os: macos-14
            label: macOS
          - os: ubuntu-22.04
            label: Linux-x86_64

    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && secrets.KEYCHAIN_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            patchelf \
            pkg-config \
            rpm \
            wget

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri updater signing key
        shell: bash
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$RAW_TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY. Generate it before publishing releases." >&2
            exit 1
          fi

          raw="$RAW_TAURI_SIGNING_PRIVATE_KEY"
          key_path="$RUNNER_TEMP/tauri-signing.key"

          if printf '%s' "$raw" | grep -q '^untrusted comment:'; then
            printf '%s\n' "$raw" > "$key_path"
          elif decoded=$(printf '%s' "$raw" | (base64 --decode 2>/dev/null || base64 -D 2>/dev/null)) && printf '%s' "$decoded" | grep -q '^untrusted comment:'; then
            printf '%s\n' "$decoded" > "$key_path"
          else
            printf '%s\n%s\n' "untrusted comment: tauri signing key" "$raw" > "$key_path"
          fi

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            cat "$key_path"
            echo "EOF"
          } >> "$GITHUB_ENV"

          if [ -n "$RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_SIGNING == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/apple-certificate.p12"
          keychain_path="$RUNNER_TEMP/build.keychain-db"

          printf '%s' "${{ secrets.APPLE_CERTIFICATE }}" | (base64 --decode 2>/dev/null || base64 -D) > "$cert_path"

          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$keychain_path"

          identity=$(security find-identity -v -p codesigning "$keychain_path" | grep "Developer ID Application" | grep -oE '"[^"]+"' | head -1 | tr -d '"')
          if [ -z "$identity" ]; then
            echo "No Developer ID Application identity found in certificate." >&2
            security find-identity -v -p codesigning "$keychain_path"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Build macOS app
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Build Windows app
        if: runner.os == 'Windows'
        run: pnpm tauri build

      - name: Build Linux app
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          version="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"

          copy_asset() {
            src="$1"
            dest="$2"
            if [ -f "$src" ]; then
              cp "$src" "release-assets/$dest"
              if [ -f "$src.sig" ]; then
                cp "$src.sig" "release-assets/$dest.sig"
              fi
            fi
          }

          if [ "${{ runner.os }}" = "macOS" ]; then
            dmg=$(find src-tauri/target -path "*/bundle/dmg/*.dmg" -type f | head -1 || true)
            app=$(find src-tauri/target -path "*/bundle/macos/*.app" -type d | head -1 || true)
            tarball=$(find src-tauri/target -path "*/bundle/macos/*.tar.gz" -type f | head -1 || true)

            [ -n "$dmg" ] && copy_asset "$dmg" "${ASSET_PREFIX}-${version}-macOS.dmg"
            [ -n "$tarball" ] && copy_asset "$tarball" "${ASSET_PREFIX}-${version}-macOS.tar.gz"
            if [ -n "$app" ]; then
              ditto -c -k --sequesterRsrc --keepParent "$app" "release-assets/${ASSET_PREFIX}-${version}-macOS.zip"
            fi
          elif [ "${{ runner.os }}" = "Windows" ]; then
            msi=$(find src-tauri/target -path "*/bundle/msi/*.msi" -type f | head -1 || true)
            exe=$(find src-tauri/target -path "*/release/*.exe" -type f | head -1 || true)
            [ -n "$msi" ] && copy_asset "$msi" "${ASSET_PREFIX}-${version}-Windows.msi"
            if [ -n "$exe" ]; then
              mkdir -p portable
              cp "$exe" "portable/Better Gate.exe"
              printf 'portable=true\n' > portable/portable.ini
              7z a "release-assets/${ASSET_PREFIX}-${version}-Windows-Portable.zip" ./portable/*
            fi
          else
            appimage=$(find src-tauri/target -path "*/bundle/appimage/*.AppImage" -type f | head -1 || true)
            deb=$(find src-tauri/target -path "*/bundle/deb/*.deb" -type f | head -1 || true)
            rpm=$(find src-tauri/target -path "*/bundle/rpm/*.rpm" -type f | head -1 || true)
            [ -n "$appimage" ] && copy_asset "$appimage" "${ASSET_PREFIX}-${version}-Linux-x86_64.AppImage"
            [ -n "$deb" ] && copy_asset "$deb" "${ASSET_PREFIX}-${version}-Linux-x86_64.deb"
            [ -n "$rpm" ] && copy_asset "$rpm" "${ASSET_PREFIX}-${version}-Linux-x86_64.rpm"
          fi

          ls -la release-assets

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.label }}
          path: release-assets/*
          if-no-files-found: error

      - name: Clean Apple keychain
        if: runner.os == 'macOS' && always() && env.APPLE_KEYCHAIN_PATH != ''
        shell: bash
        run: security delete-keychain "$APPLE_KEYCHAIN_PATH" || true

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          version="${tag#v}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"

          mac_url=""; mac_sig=""
          win_url=""; win_sig=""
          linux_url=""; linux_sig=""

          shopt -s nullglob
          for sig in release-assets/*.sig; do
            asset="${sig%.sig}"
            file="$(basename "$asset")"
            content="$(cat "$sig")"
            case "$file" in
              *macOS.tar.gz) mac_url="$base_url/$file"; mac_sig="$content" ;;
              *Windows.msi) win_url="$base_url/$file"; win_sig="$content" ;;
              *Linux-x86_64.AppImage) linux_url="$base_url/$file"; linux_sig="$content" ;;
            esac
          done

          VERSION="$version" \
          PUB_DATE="$pub_date" \
          MAC_URL="$mac_url" \
          MAC_SIG="$mac_sig" \
          WIN_URL="$win_url" \
          WIN_SIG="$win_sig" \
          LINUX_URL="$linux_url" \
          LINUX_SIG="$linux_sig" \
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.VERSION;
          const pubDate = process.env.PUB_DATE;
          const entries = [];
          function add(key, url, signature) {
            if (url && signature) entries.push([key, { url, signature }]);
          }
          add("darwin-aarch64", process.env.MAC_URL, process.env.MAC_SIG);
          add("darwin-x86_64", process.env.MAC_URL, process.env.MAC_SIG);
          add("windows-x86_64", process.env.WIN_URL, process.env.WIN_SIG);
          add("linux-x86_64", process.env.LINUX_URL, process.env.LINUX_SIG);
          fs.writeFileSync(
            "latest.json",
            JSON.stringify(
              {
                version,
                notes: `Better Gate ${version}`,
                pub_date: pubDate,
                platforms: Object.fromEntries(entries),
              },
              null,
              2,
            ),
          );
          NODE

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Better Gate ${{ github.ref_name }}
          prerelease: true
          body: |
            ## Better Gate ${{ github.ref_name }}

            Better Gate 桌面客户端内测版本。

            ### 下载

            - macOS: `Better-Gate-${{ github.ref_name }}-macOS.dmg` 或 `Better-Gate-${{ github.ref_name }}-macOS.zip`
            - Windows: `Better-Gate-${{ github.ref_name }}-Windows.msi`
            - Linux: `Better-Gate-${{ github.ref_name }}-Linux-x86_64.AppImage`

            macOS 当前可使用未签名内测包。首次打开如被系统拦截，请在系统设置的“隐私与安全性”中选择仍要打开。
          files: |
            release-assets/*
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
